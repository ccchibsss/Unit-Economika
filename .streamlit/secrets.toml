# ============================================================================
# 🔐 Google Cloud Service Account
# ============================================================================
# Как получить:
# 1. Перейдите на https://console.cloud.google.com/
# 2. Создайте новый проект (или выберите существующий)
# 3. Включите API:
#    - Google Sheets API
#    - Google Drive API
# 4. Перейдите в IAM & Admin → Service Accounts
# 5. Нажмите "Create Service Account"
#    - Name: unit-economics-sa
#    - Role: Editor (или Owner)
# 6. Создайте ключ:
#    - Keys → Add Key → Create new key → JSON
#    - Скачайте файл
# 7. Скопируйте содержимое JSON сюда
# ============================================================================

[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = "-----BEGIN PRIVATE KEY-----\nYOUR_PRIVATE_KEY_HERE\n-----END PRIVATE KEY-----\n"
client_email = "your-sa@your-project-id.iam.gserviceaccount.com"
client_id = "your-client-id"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/your-sa%40your-project-id.iam.gserviceaccount.com"
universe_domain = "googleapis.com"

# ============================================================================
# 🤖 DeepSeek API Key
# ============================================================================
# Как получить:
# 1. Перейдите на https://platform.deepseek.com/
# 2. Зарегистрируйтесь / войдите
# 3. Перейдите в раздел "API Keys"
# 4. Нажмите "Create new key"
# 5. Скопируйте ключ сюда
# ============================================================================

deepseek_api_key = "sk-your-deepseek-api-key-here"

# ============================================================================
# 🏪 Marketplace API Keys (опционально)
# ============================================================================

[ozon]
api_key = "your-ozon-api-key"
client_id = "your-ozon-client-id"

[wildberries]
api_key = "your-wildberries-api-key"

[yandex_market]
oauth_token = "your-yandex-market-oauth-token"

# ============================================================================
# 📧 Email для уведомлений (опционально)
# ============================================================================

admin_email = "admin@example.com"
